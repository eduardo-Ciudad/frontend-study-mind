<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280"/>
  <title>StudyMind — Performance</title>
  <link rel="stylesheet" href="../css/base.css"/>
</head>
<body>
<div id="app" class="app"></div>
<div id="toast-container"></div>
<script src="../js/shared.js"></script>
<script>
const periods = {
  '7d':  { labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], acc:[62,65,68,64,72,75,76], tasks:[40,55,50,70,60,75,82] },
  '30d': { labels:['W1','W2','W3','W4','W5','W6','W7','W8'], acc:[58,61,60,65,68,70,73,76], tasks:[35,42,50,55,58,62,68,74] },
  '90d': { labels:['M1','M2','M3'], acc:[52,64,76], tasks:[38,56,74] },
};
let activePeriod = '7d';

function buildRadarSVG(subjects) {
  const cx = 180, cy = 180, r = 130;
  const n = subjects.length;
  const angle = i => (i * 2 * Math.PI / n) - Math.PI/2;
  const pt = (i, pct) => {
    const a = angle(i), dist = r * pct / 100;
    return [cx + dist * Math.cos(a), cy + dist * Math.sin(a)];
  };
  const gridCircles = [20,40,60,80,100].map(p =>
    `<polygon points="${subjects.map((_,i) => pt(i,p).join(',')).join(' ')}" fill="none" stroke="rgba(148,163,184,0.06)" stroke-width="1"/>`
  ).join('');
  const axes = subjects.map((_,i) => {
    const [x,y] = pt(i,100);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(148,163,184,0.06)" stroke-width="1"/>`;
  }).join('');
  const labels = subjects.map((s,i) => {
    const [x,y] = pt(i,118);
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#64748B" font-family="Inter">${s.name}</text>`;
  }).join('');
  const dataPoints = subjects.map((_,i) => pt(i, subjects[i].accuracy));
  const polygon = `<polygon points="${dataPoints.map(p=>p.join(',')).join(' ')}" fill="rgba(99,102,241,0.15)" stroke="#6366F1" stroke-width="2"/>`;
  const dots = dataPoints.map(([x,y],i) => `<circle cx="${x}" cy="${y}" r="4" fill="#0B0F1A" stroke="${subjects[i].color}" stroke-width="2"/>`).join('');
  return `<svg viewBox="0 0 360 360" style="width:100%;max-width:360px;display:block;margin:0 auto">
    ${gridCircles}${axes}${labels}${polygon}${dots}
  </svg>`;
}

function buildHeatmap() {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const weeks = 12;
  const data = Array.from({length:weeks*7}, () => Math.random() > 0.3 ? Math.floor(Math.random()*4)+1 : 0);
  const colors = ['var(--bg-3)', 'rgba(99,102,241,0.20)', 'rgba(99,102,241,0.40)', 'rgba(99,102,241,0.65)', 'rgba(99,102,241,0.90)'];
  return `
    <div style="overflow-x:auto">
      <div style="display:flex;gap:4px;align-items:flex-start;min-width:fit-content">
        <div style="display:flex;flex-direction:column;gap:3px;margin-top:18px">
          ${days.map(d=>`<div style="font-size:10px;color:var(--fg-4);height:13px;line-height:13px;width:28px">${d}</div>`).join('')}
        </div>
        <div>
          <div style="display:flex;gap:3px;margin-bottom:4px">
            ${Array.from({length:weeks},(_,w)=>`<div style="font-size:10px;color:var(--fg-4);width:13px;text-align:center">${w+1}</div>`).join('')}
          </div>
          <div style="display:grid;grid-template-rows:repeat(7,13px);grid-auto-flow:column;grid-auto-columns:13px;gap:3px">
            ${data.map(v=>`<div style="width:13px;height:13px;border-radius:3px;background:${colors[v]};transition:all 200ms" title="${v} tasks"></div>`).join('')}
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:var(--fg-4)">
        Less ${colors.map(c=>`<span style="width:10px;height:10px;border-radius:2px;background:${c};display:inline-block"></span>`).join('')} More
      </div>
    </div>`;
}

function setPeriod(p) {
  activePeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('btn--secondary', b.dataset.p === p));
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('btn--ghost', b.dataset.p !== p));
  const d = periods[p];
  document.getElementById('perf-chart-wrap').innerHTML = buildPerfChart(d.labels, d.acc, d.tasks, 600, 200);
}

function render() {
  const s = State;
  document.getElementById('app').innerHTML = `
    ${buildSidebar('performance')}
    <div>
      ${buildTopbar('Workspace','Performance')}
      <main class="main page-enter">

        <div class="section__head">
          <div>
            <h1 class="section__title">${icon('trending',20)} Performance analytics</h1>
            <p class="section__sub">Track your accuracy, streak, and subject evolution over time</p>
          </div>
          <button class="btn btn--ghost btn--sm" onclick="showToast('Report exported!')">${icon('filter',12)} Export report</button>
        </div>

        <!-- Top stats -->
        <div class="grid-4" style="margin-top:20px">
          <div class="card stat card--hover">
            <div class="stat__head"><div class="stat__icon stat__icon--am">${icon('flame',16)}</div><span class="stat__delta">↑ +3</span></div>
            <div class="stat__label">Current streak</div>
            <div class="stat__value">12<span class="stat__value-unit"> days</span></div>
            <div class="stat__sub">Personal best: 18 days</div>
          </div>
          <div class="card stat card--hover">
            <div class="stat__head"><div class="stat__icon">${icon('target',16)}</div><span class="stat__delta">↑ +4.2%</span></div>
            <div class="stat__label">Overall accuracy</div>
            <div class="stat__value">76<span class="stat__value-unit">%</span></div>
            <div class="stat__sub">7-day rolling average</div>
          </div>
          <div class="card stat card--hover">
            <div class="stat__head"><div class="stat__icon stat__icon--em">${icon('check-circle',16)}</div><span class="stat__delta">↑ +22</span></div>
            <div class="stat__label">Tasks this month</div>
            <div class="stat__value">148</div>
            <div class="stat__sub">Target: 180</div>
          </div>
          <div class="card stat card--hover">
            <div class="stat__head"><div class="stat__icon stat__icon--sky">${icon('clock',16)}</div></div>
            <div class="stat__label">Study time</div>
            <div class="stat__value">42<span class="stat__value-unit">h</span></div>
            <div class="stat__sub">This month · avg 1.4h/day</div>
          </div>
        </div>

        <!-- Main chart -->
        <section class="section">
          <div class="card card--padded">
            <div class="card__header">
              <div>
                <div class="card__title">${icon('trending',16)} Accuracy & task completion</div>
                <div class="card__sub">Daily performance trend</div>
              </div>
              <div class="row" style="gap:6px">
                ${['7d','30d','90d'].map(p=>`<button class="btn btn--sm period-btn${p==='7d'?' btn--secondary':' btn--ghost'}" data-p="${p}" onclick="setPeriod('${p}')">${p}</button>`).join('')}
              </div>
            </div>
            <div id="perf-chart-wrap" style="height:220px"></div>
            <div style="display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-1)">
              <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-3)"><span style="width:10px;height:10px;border-radius:3px;background:#818CF8;display:inline-block"></span>Accuracy %</div>
              <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-3)"><span style="width:10px;height:10px;border-radius:3px;background:#34D399;display:inline-block"></span>Daily target completion %</div>
            </div>
          </div>
        </section>

        <!-- Radar + Subject breakdown -->
        <section class="section">
          <div class="grid-2">
            <div class="card card--padded">
              <div class="card__header">
                <div>
                  <div class="card__title">${icon('bar-chart',16)} By subject</div>
                  <div class="card__sub">30-day accuracy per subject</div>
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px">
                ${buildSubjectBreakdown(s.subjects)}
              </div>
              <div class="divider"></div>
              ${s.subjects.map(subj => `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-1)">
                  <div style="display:flex;align-items:center;gap:10px">
                    <div class="roadmap__icon" style="background:linear-gradient(135deg,${subj.color},${subj.color2})">${subj.init}</div>
                    <div>
                      <div style="font-size:13px;font-weight:500;color:var(--fg-1)">${subj.name}</div>
                      <div style="font-size:11px;color:var(--fg-4)">${subj.topic}</div>
                    </div>
                  </div>
                  <div style="text-align:right">
                    <div style="font-family:var(--font-mono);font-size:16px;font-weight:600;color:${subj.color}">${subj.accuracy}%</div>
                    <div style="font-size:11px;color:var(--fg-4)">accuracy</div>
                  </div>
                </div>`).join('')}
            </div>
            <div class="card card--padded">
              <div class="card__header">
                <div>
                  <div class="card__title">${icon('target',16)} Subject radar</div>
                  <div class="card__sub">Balanced coverage view</div>
                </div>
              </div>
              ${buildRadarSVG(s.subjects)}
              <div class="divider" style="margin-top:16px"></div>
              <div class="card__header" style="margin-top:16px;margin-bottom:12px">
                <div class="card__title">${icon('flame',16)} Study activity</div>
                <div class="card__sub">Last 12 weeks</div>
              </div>
              ${buildHeatmap()}
            </div>
          </div>
        </section>

        <!-- AI insights -->
        <section class="section">
          <div class="card ai-panel card--padded">
            <div class="card__header">
              <div>
                <div class="card__title" style="color:var(--fg-1)">${icon('sparkles',16)} Performance insights</div>
                <div class="card__sub">AI analysis of your last 30 days</div>
              </div>
              <button class="btn btn--ghost btn--sm" onclick="showToast('Refreshed!')">Refresh ${icon('refresh-cw',12)}</button>
            </div>
            <div class="grid-3" style="gap:12px">
              ${[
                { ico:'zap', text:"Biology accuracy up 27% this week. You're building momentum — add advanced topics.", meta:'Trend: 7-day window', color:'var(--emerald-400)' },
                { ico:'alert', text:'Chemistry at 54% — stoichiometry is pulling the average down. Prioritize for next 3 days.', meta:'Based on last 5 quizzes', color:'#FB7185' },
                { ico:'flame', text:'12-day streak is your second best. One more day ties your record.', meta:'Streak data', color:'#FBBF24' },
              ].map(m => `
                <div class="ai-msg" style="flex-direction:column;gap:10px">
                  <div style="display:flex;gap:10px;align-items:center">
                    <div class="ai-msg__icon" style="color:${m.color};background:${m.color}22;box-shadow:0 0 16px ${m.color}33;border:1px solid ${m.color}33">${icon(m.ico,14)}</div>
                    <span style="font-size:11px;color:var(--fg-4)">${m.meta}</span>
                  </div>
                  <div class="ai-msg__text">${m.text}</div>
                </div>`).join('')}
            </div>
          </div>
        </section>

        ${buildTechStrip()}
      </main>
    </div>`;

  const d = periods[activePeriod];
  document.getElementById('perf-chart-wrap').innerHTML = buildPerfChart(d.labels, d.acc, d.tasks, 600, 200);
}

render();
</script>
</body>
</html>
